<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JavaGoat - Tournament App</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK (v8 for compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-color: #0b0e1e;
            --card-bg: #161a35;
            --primary-blue: #2a52be;
            --primary-blue-light: #436eee;
            --accent-gold: #f5a623;
            --accent-gold-light: #ffd05b;
            --text-main: #ffffff;
            --text-muted: #8a91b4;
            --nav-bg: #12162b;
            --success-green: #28a745;
            --error-red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #05060f; color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }

        /* Mobile Container */
        .app-container {
            width: 100%; max-width: 414px; height: 100vh;
            background-color: var(--bg-color); position: relative; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.6);
            transition: background-color 0.4s ease;
        }

        /* Fade Transition */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Page Management */
        .page { display: none; min-height: 100%; }
        .page.active { display: block; }

        /* Top Header */
        .top-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px 8px 20px; z-index: 20; transition: color 0.3s ease;
        }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-profile img {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid var(--primary-blue); object-fit: cover; transition: border-color 0.3s;
        }
        .header-title { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }
        .header-actions { display: flex; align-items: center; gap: 12px; }

        /* Wallet */
        .wallet {
            display: flex; align-items: center; background: linear-gradient(135deg, var(--success-green), #1e7e34);
            color: white !important; padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 700; box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }
        .wallet i { margin: 0 5px; }

        /* Logout Button */
        .logout-btn {
            background: rgba(0,0,0,0.12); border: 1px solid rgba(0,0,0,0.15);
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; color: inherit; font-size: 1rem;
        }
        .logout-btn:hover { background: rgba(255, 59, 48, 0.2); color: #ff3b30; transform: scale(1.1); }

        /* Main Content Area */
        .main-content {
            flex: 1; overflow-y: auto; padding: 0 20px 85px 20px; 
            scrollbar-width: none; position: relative; z-index: 5;
        }
        .main-content::-webkit-scrollbar { display: none; }

        /* Reusable UI */
        .gold-btn {
            background: linear-gradient(to right, var(--accent-gold), var(--accent-gold-light));
            color: #000; border: none; padding: 8px 20px; border-radius: 20px;
            font-weight: 700; font-size: 0.8rem; cursor: pointer;
            box-shadow: 0 4px 10px rgba(245, 166, 35, 0.3); position: relative; overflow: hidden;
        }
        .gold-btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(30deg); transition: all 0.5s; opacity: 0;
        }
        .gold-btn:hover::after { left: 100%; opacity: 1; transition: left 0.5s; }
        .gold-btn:active { transform: scale(0.98); }

        /* Red Pulsing Button */
        .red-btn {
            background: linear-gradient(to right, var(--error-red), #c62828); color: white;
            border: none; padding: 8px 20px; border-radius: 20px;
            font-weight: 700; font-size: 0.85rem; cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 59, 48, 0.5); position: relative; z-index: 5;
            animation: pulseZoom 1.5s ease-in-out infinite;
        }
        @keyframes pulseZoom {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 10px rgba(255, 59, 48, 0.4); }
            50% { transform: scale(1.08); box-shadow: 0 8px 20px rgba(255, 59, 48, 0.6); }
        }

        /* Pill Nav */
        .pill-nav {
            display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none;
        }
        .pill-nav::-webkit-scrollbar { display: none; }
        .pill {
            padding: 7px 16px; background: rgba(255,255,255,0.08); border-radius: 20px;
            font-size: 0.8rem; white-space: nowrap; color: var(--text-muted); cursor: pointer;
            transition: 0.3s; border: 1px solid transparent;
        }
        .pill.active {
            background: var(--error-red) !important; color: white !important;
            border-color: rgba(255,255,255,0.2); box-shadow: 0 2px 8px rgba(255, 59, 48, 0.4);
        }

        .section-title { font-size: 1.15rem; font-weight: 700; margin: 15px 0 12px 0; display: flex; justify-content: space-between; align-items: center; }

        /* Leaderboard / Rank Page Styles */
        .podium-container {
            display: flex; justify-content: center; align-items: flex-end; gap: 10px;
            margin: 20px 0 30px 0; padding: 10px; height: 180px;
        }
        .podium-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            background: var(--card-bg); border-radius: 16px; padding: 15px 5px;
            position: relative; border: 1px solid rgba(255,255,255,0.05);
        }
        .podium-item.first { height: 100%; border-color: var(--accent-gold); box-shadow: 0 10px 25px rgba(245, 166, 35, 0.2); }
        .podium-item.second { height: 85%; }
        .podium-item.third { height: 75%; }
        
        .podium-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.2rem; background: #222; margin-bottom: 8px;
            border: 2px solid transparent;
        }
        .podium-item.first .podium-avatar { border-color: var(--accent-gold); width: 55px; height: 55px; }
        .podium-badge {
            position: absolute; top: -10px; font-size: 1.2rem;
        }
        .podium-name { font-size: 0.75rem; font-weight: 600; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .podium-score { font-size: 0.75rem; color: var(--accent-gold); font-weight: 700; }

        .rank-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .leaderboard-item {
            display: flex; align-items: center; background: var(--card-bg);
            padding: 12px 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.03);
        }
        .rank-num { width: 30px; font-weight: 700; color: var(--text-muted); font-size: 0.9rem; }
        .lb-avatar {
            width: 38px; height: 38px; border-radius: 50%; margin-right: 12px;
            background: #2a2e45; display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: white; font-size: 0.9rem;
        }
        .lb-info { flex: 1; }
        .lb-name { font-size: 0.9rem; font-weight: 600; }
        .lb-score { color: var(--accent-gold); font-weight: 700; font-size: 0.9rem; }

        /* Chess Feature Section */
        .chess-feature { position: relative; width: 100%; height: 190px; margin: 10px 0 25px 0; display: flex; align-items: center; overflow: visible; }
        .chess-glow {
            position: absolute; width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(245,166,35,0.3) 0%, transparent 70%);
            border-radius: 50%; animation: pulseGlow 3s ease-in-out infinite; z-index: 1; left: 20%; top: -10px;
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.9; }
        }
        .chess-float-img {
            position: relative; z-index: 2; height: 170px; max-width: 95%; object-fit: contain;
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.6)); animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-3deg); } 50% { transform: translateY(-12px) rotate(2deg); }
        }
        .hero-content { position: relative; z-index: 3; text-align: right; flex: 1; display: flex; flex-direction: column; align-items: flex-end; padding-right: 10px; }
        .hero-content h2 { font-size: 1.35rem; color: white; line-height: 1.2; margin-bottom: 6px; animation: textGlow 2s ease-in-out infinite alternate; }
        @keyframes textGlow {
            from { text-shadow: 0 2px 4px rgba(0,0,0,0.8); } to { text-shadow: 0 0 15px rgba(245,166,35,0.6), 0 2px 8px rgba(0,0,0,0.8); }
        }
        .hero-content p { font-size: 0.8rem; margin-bottom: 14px; color: var(--accent-gold-light); font-weight: 700; background: rgba(0,0,0,0.5); padding: 3px 10px; border-radius: 8px; display: inline-block; animation: slideFade 0.6s ease-out; }
        @keyframes slideFade { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .chess-badge {
            position: absolute; bottom: -6px; right: 50%; transform: translateX(50%);
            background: linear-gradient(to right, var(--accent-gold), var(--accent-gold-light)); color: #000; padding: 4px 12px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 700; z-index: 3;
            box-shadow: 0 4px 12px rgba(245, 166, 35, 0.4); white-space: nowrap; animation: badgePop 0.5s ease-out backwards;
        }
        @keyframes badgePop { from { transform: translateX(50%) scale(0); opacity: 0; } to { transform: translateX(50%) scale(1); opacity: 1; } }

        /* Slider with Arrows */
        .slider-wrapper { position: relative; margin-bottom: 20px; padding: 5px 0; }
        .slider-container { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x mandatory; padding: 5px; }
        .slider-container::-webkit-scrollbar { display: none; }
        
        .slider-container .game-card {
            max-width: 120px;
            flex-shrink: 0;
            scroll-snap-align: start;
        }

        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 34px; height: 34px; border-radius: 50%; background: rgba(15, 18, 35, 0.85);
            backdrop-filter: blur(8px); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
            cursor: pointer; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: all 0.2s;
        }
        .slider-btn:hover { background: var(--accent-gold); color: #000; transform: translateY(-50%) scale(1.1); }
        .slider-btn.left { left: -8px; } .slider-btn.right { right: -8px; }

        /* Game Grid (3 per row) */
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding-bottom: 5px; }
        .game-card {
            height: 185px; background: var(--card-bg); border-radius: 16px; position: relative;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); z-index: 2; }
        .game-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
        .game-card:hover img { transform: scale(1.08); }
        .game-card::before {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 65%; background: linear-gradient(to top, rgba(11,14,30,0.95) 0%, transparent 100%);
            z-index: 1; pointer-events: none;
        }
        .game-card h4 {
            position: absolute; bottom: 58px; left: 8px; right: 8px;
            font-size: 0.9rem; font-weight: 700; color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 2; margin: 0;
            letter-spacing: 0.3px; text-align: center;
        }
        .game-card .gold-btn {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            padding: 7px 12px; font-size: 0.75rem; border-radius: 12px; z-index: 2;
        }

        /* Auth Styles */
        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; height: 100%; }
        .auth-card {
            background: rgba(22, 26, 53, 0.75); backdrop-filter: blur(12px);
            border-radius: 24px; padding: 28px 24px; width: 100%; max-width: 360px;
            border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .auth-title {
            font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 24px;
            background: linear-gradient(to right, var(--accent-gold), var(--accent-gold-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-form { display: flex; flex-direction: column; gap: 14px; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.95rem; transition: color 0.2s; }
        .auth-input {
            width: 100%; padding: 13px 14px 13px 44px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; color: var(--text-main);
            font-size: 0.95rem; outline: none; transition: all 0.25s;
        }
        .auth-input:focus { border-color: var(--accent-gold); background: rgba(255,255,255,0.1); box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.25); }
        .auth-input:focus ~ i { color: var(--accent-gold); }
        .auth-input::placeholder { color: rgba(138,145,180,0.6); }
        .auth-btn {
            background: linear-gradient(to right, var(--accent-gold), var(--accent-gold-light)); color: #000; border: none;
            padding: 14px; border-radius: 14px; font-weight: 700; font-size: 1rem;
            cursor: pointer; margin-top: 6px; box-shadow: 0 6px 15px rgba(245, 166, 35, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .auth-toggle { text-align: center; margin-top: 22px; font-size: 0.9rem; color: var(--text-muted); }
        .auth-toggle a { color: var(--accent-gold); font-weight: 600; text-decoration: none; cursor: pointer; position: relative; }
        .divider { text-align: center; margin: 18px 0; color: var(--text-muted); font-size: 0.8rem; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 30%; height: 1px; background: rgba(255,255,255,0.1); }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .social-login { display: flex; justify-content: center; gap: 14px; margin-top: 5px; }
        .social-btn {
            width: 44px; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.1rem; cursor: pointer; transition: all 0.25s;
        }

        /* Tournament Styles */
        .tournament-list-card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .t-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .t-image-wrapper { position: relative; height: 100px; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .t-image-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .t-prize { position: absolute; bottom: 10px; right: 10px; font-weight: bold; color: var(--accent-gold); text-shadow: 0 1px 3px black;}
        .t-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;}
        .progress-bar { width: 100px; height: 4px; background: #333; border-radius: 2px; margin-top: 5px; }
        .progress-fill { height: 100%; background: var(--accent-gold); border-radius: 2px; width: 70%; }

        /* Wallet Page */
        .wallet-card {
            background: #0065A1;
            border-radius: 24px; padding: 25px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.35);
            position: relative; overflow: hidden;
        }
        .wallet-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        .wallet-balance {
            font-size: 2.5rem; font-weight: 800; text-align: center; margin: 15px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3); position: relative; z-index: 2;
        }
        .wallet-actions { display: flex; gap: 12px; margin-top: 20px; }
        .wallet-action-btn {
            flex: 1; padding: 14px; border-radius: 16px; font-weight: 600; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            border: none; cursor: pointer; transition: all 0.2s;
        }
        .wallet-add, .wallet-withdraw { background: rgba(255,255,255,0.2); color: white; }

        /* Transaction List */
        .transaction-item {
            background: var(--card-bg); border-radius: 14px; padding: 14px 18px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--accent-gold);
        }
        .transaction-item.credit { border-left-color: var(--success-green); }
        .transaction-item.debit { border-left-color: var(--error-red); }
        .transaction-details h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
        .transaction-details p { font-size: 0.75rem; color: var(--text-muted); }
        .transaction-amount { font-weight: 700; font-size: 1.1rem; }
        .transaction-amount.credit { color: var(--success-green); }
        .transaction-amount.debit { color: var(--error-red); }

        /* Profile Page */
        .profile-card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            text-align: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08);
        }
        .profile-avatar {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 700; margin: 0 auto 15px;
            color: #000; box-shadow: 0 8px 25px rgba(245, 166, 35, 0.4);
        }
        .profile-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; }
        .profile-email { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }
        .profile-actions { display: flex; flex-direction: column; gap: 12px; }
        .profile-btn {
            width: 100%; padding: 14px; border-radius: 16px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s; display: flex;
            align-items: center; justify-content: center; gap: 10px;
        }
        .profile-btn.secondary { background: rgba(255,255,255,0.08); color: var(--text-main); border: 1px solid rgba(255,255,255,0.15); }
        .profile-btn.danger { background: linear-gradient(to right, var(--error-red), #c62828); color: white; }

        /* Bottom Navigation */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.7rem; cursor: pointer; transition: 0.3s; width: 20%; }
        .nav-item i { font-size: 1.25rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--error-red); }
        .nav-center {
            position: relative; top: -22px; width: 62px; height: 62px;
            background: linear-gradient(135deg, var(--error-red), #c62828);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 20px rgba(255, 59, 48, 0.5);
            border: 4px solid var(--nav-bg); color: white; font-size: 1.3rem; font-weight: bold;
        }

        /* Modals */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            align-items: center; justify-content: center; z-index: 200; 
            backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border-radius: 24px; padding: 25px;
            width: 90%; max-width: 360px; border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-title {
            font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 20px;
            background: linear-gradient(to right, var(--accent-gold), var(--accent-gold-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .modal-btn {
            width: 100%; padding: 14px; border-radius: 14px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s;
        }
        .modal-btn.primary { background: linear-gradient(to right, var(--success-green), #1e7e34); color: white; }
        .modal-btn.secondary { background: rgba(255,255,255,0.08); color: var(--text-main); border: 1px solid rgba(255,255,255,0.15); }

        /* Toast Notification */
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 12px 20px;
            border-radius: 12px; color: white; font-weight: 500; font-size: 0.9rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); z-index: 300;
            display: none; animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.7s forwards;
        }
        .toast.success { background: linear-gradient(to right, var(--success-green), #1e7e34); }
        .toast.error { background: linear-gradient(to right, var(--error-red), #c62828); }
        @keyframes slideIn { from { transform: translateX(150px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Theme Styling */
        .app-container.auth-theme { background: radial-gradient(circle at 30% 20%, #1a1f3d, #0b0e1e 60%); }
        .app-container.home-theme { background-color: #ffcc00; }
        .app-container.home-theme .top-header, .app-container.home-theme .header-title { color: #000; }
        .app-container.home-theme .user-profile img { border-color: #000; }
        .app-container.home-theme .logout-btn { background: rgba(0,0,0,0.15); border-color: rgba(0,0,0,0.2); color: #000; }
        .app-container.home-theme .logout-btn:hover { background: rgba(255, 59, 48, 0.3); color: #ff3b30; }
        .app-container.home-theme .pill { background: rgba(0,0,0,0.15); color: #222; border-color: transparent; }
        .app-container.home-theme .pill.active { background: #ff3b30 !important; color: white !important; border-color: transparent; }
        .app-container.home-theme .main-content { position: relative; z-index: 1; }
        .app-container.home-theme .main-content::before {
            content: ''; position: absolute; top: 210px; left: 0; right: 0;
            height: 3000px; background-color: var(--bg-color);
            border-top-left-radius: 35px; border-top-right-radius: 35px;
            z-index: -1; box-shadow: 0 -8px 25px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <div class="app-container auth-theme">
        <header class="top-header">
            <div class="user-profile">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" alt="User" id="user-avatar">
                <span class="header-title" id="page-title">JavaGoat</span>
            </div>
            <div class="header-actions">
                <div class="wallet" style="display:none;" id="wallet-badge">
                    <i class="fa-solid fa-coins"></i><span id="header-balance">₹0</span><i class="fa-solid fa-wallet"></i>
                </div>
                <button class="logout-btn" id="logout-btn" style="display:none;" title="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </header>

        <main class="main-content" id="app-view">
            <div id="loginPage" class="page"></div>
            <div id="homePage" class="page"></div>
            <div id="myTournamentsPage" class="page"></div>
            <div id="walletPage" class="page"></div>
            <div id="profilePage" class="page"></div>
            <div id="rankPage" class="page"></div>
        </main>

        <nav class="bottom-nav" id="bottom-nav" style="display: none;">
            <div class="nav-item active" onclick="navigateTo('homePage', event)">
                <i class="fa-solid fa-house"></i><span>Home</span>
            </div>
            <div class="nav-item" onclick="navigateTo('myTournamentsPage', event)">
                <i class="fa-solid fa-trophy"></i><span>Matches</span>
            </div>
            <div class="nav-item">
                <div class="nav-center" onclick="navigateTo('walletPage', event)">
                    <i class="fa-solid fa-wallet"></i>
                </div>
            </div>
            <div class="nav-item" onclick="navigateTo('profilePage', event)">
                <i class="fa-solid fa-user"></i><span>Profile</span>
            </div>
            <div class="nav-item" onclick="navigateTo('rankPage', event)">
                <i class="fa-solid fa-ranking-star"></i><span>Rank</span>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="addMoneyModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">Add Money</h3>
            <form id="addMoneyForm" class="modal-form">
                <input type="number" id="add-amount" placeholder="Enter amount (₹)" class="modal-input" required min="1">
                <div class="modal-actions">
                    <button type="submit" class="modal-btn primary">Add to Wallet</button>
                    <button type="button" onclick="toggleModal('addMoneyModal', false)" class="modal-btn secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="withdrawMoneyModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">Withdraw Money</h3>
            <form id="withdrawMoneyForm" class="modal-form">
                <input type="number" id="withdraw-amount" placeholder="Enter amount (₹)" class="modal-input" required min="1">
                <input type="text" id="withdraw-details" placeholder="UPI ID or Bank Details" class="modal-input" required>
                <div class="modal-actions">
                    <button type="submit" class="modal-btn primary">Request Withdraw</button>
                    <button type="button" onclick="toggleModal('withdrawMoneyModal', false)" class="modal-btn secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // Security & UX
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.body.style.userSelect = 'none';
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA1_zl6X1ZYt8mN5uwJ-81qyb11uV-Kmi0",
            authDomain: "tsample-e99ea.firebaseapp.com",
            databaseURL: "https://tsample-e99ea-default-rtdb.firebaseio.com",
            projectId: "tsample-e99ea",
            storageBucket: "tsample-e99ea.firebasestorage.app",
            messagingSenderId: "725687331089",
            appId: "1:725687331089:web:030803ecc0df2ddbd904b0"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUserData = null;

        function navigateTo(pageId, fromEvent = null) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const targetPage = document.getElementById(pageId);
            if (targetPage) targetPage.classList.add('active');
            
            if (fromEvent && fromEvent.currentTarget) {
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                fromEvent.currentTarget.classList.add('active');
            } else {
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                    const onclickAttr = item.getAttribute('onclick');
                    if (onclickAttr && onclickAttr.includes(pageId)) item.classList.add('active');
                });
            }
            
            loadPageContent(pageId);
            const mainContent = document.querySelector('.main-content');
            if (mainContent) mainContent.scrollTop = 0;
        }

        function toggleModal(modalId, show) {
            document.getElementById(modalId).classList.toggle('active', show);
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${isError ? 'error' : 'success'}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 0 }).format(amount);
        }

        auth.onAuthStateChanged(async user => {
            const showApp = !!user;
            document.getElementById('wallet-badge').style.display = showApp ? 'flex' : 'none';
            document.getElementById('logout-btn').style.display = showApp ? 'flex' : 'none';
            document.getElementById('bottom-nav').style.display = showApp ? 'flex' : 'none';
            
            if (showApp) {
                document.querySelector('.app-container').classList.remove('auth-theme');
                document.querySelector('.app-container').classList.add('home-theme');
                
                db.ref('users/' + user.uid).on('value', snap => {
                    currentUserData = { uid: user.uid, ...snap.val() };
                    document.getElementById('header-balance').textContent = formatCurrency(currentUserData.wallet_balance || 0);
                });
                
                navigateTo('homePage', null);
            } else {
                document.querySelector('.app-container').classList.remove('home-theme');
                document.querySelector('.app-container').classList.add('auth-theme');
                currentUserData = null;
                navigateTo('loginPage', null);
            }
        });

        function loadPageContent(pageId) {
            const pageContainer = document.getElementById(pageId);
            if (!pageContainer) return;
            switch (pageId) {
                case 'loginPage': renderLoginPage(pageContainer); break;
                case 'homePage': renderHomePage(pageContainer); break;
                case 'myTournamentsPage': renderMyTournamentsPage(pageContainer); break;
                case 'walletPage': renderWalletPage(pageContainer); break;
                case 'profilePage': renderProfilePage(pageContainer); break;
                case 'rankPage': renderRankPage(pageContainer); break;
            }
        }

        // Render Login Page
        function renderLoginPage(container) {
            container.innerHTML = `
                <div class="auth-container fade-in">
                    <div class="auth-card">
                        <h2 class="auth-title">JavaGoat</h2>
                        <form class="auth-form" id="auth-form">
                            <div class="input-group">
                                <i class="fa-solid fa-envelope"></i>
                                <input type="email" id="loginEmail" class="auth-input" placeholder="Email" required>
                            </div>
                            <div class="input-group">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="loginPassword" class="auth-input" placeholder="Password" required>
                            </div>
                            <button type="submit" class="auth-btn">Login</button>
                        </form>
                        <div class="auth-toggle">Don't have an account? <a onclick="toggleAuthMode('register')">Register</a></div>
                    </div>
                </div>
            `;
            const form = document.getElementById('auth-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    await auth.signInWithEmailAndPassword(e.target.loginEmail.value, e.target.loginPassword.value);
                } catch (err) { showToast(err.message, true); }
            });
        }

        function toggleAuthMode(mode) {
            const container = document.getElementById('loginPage');
            if (mode === 'register') {
                container.innerHTML = `
                    <div class="auth-container fade-in">
                        <div class="auth-card">
                            <h2 class="auth-title">Create Account</h2>
                            <form class="auth-form" id="auth-form">
                                <div class="input-group">
                                    <i class="fa-solid fa-user"></i>
                                    <input type="text" id="signupUsername" class="auth-input" placeholder="Username" required>
                                </div>
                                <div class="input-group">
                                    <i class="fa-solid fa-envelope"></i>
                                    <input type="email" id="signupEmail" class="auth-input" placeholder="Email" required>
                                </div>
                                <div class="input-group">
                                    <i class="fa-solid fa-lock"></i>
                                    <input type="password" id="signupPassword" class="auth-input" placeholder="Password" required minlength="6">
                                </div>
                                <button type="submit" class="auth-btn">Register</button>
                            </form>
                            <div class="auth-toggle">Already have an account? <a onclick="toggleAuthMode('login')">Login</a></div>
                        </div>
                    </div>
                `;
                const form = document.getElementById('auth-form');
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(e.target.signupEmail.value, e.target.signupPassword.value);
                        await db.ref('users/' + cred.user.uid).set({
                            username: e.target.signupUsername.value,
                            email: e.target.signupEmail.value,
                            wallet_balance: 0,
                            created_at: new Date().toISOString()
                        });
                    } catch (err) { showToast(err.message, true); }
                });
            } else { renderLoginPage(container); }
        }

        // Render Home Page
        async function renderHomePage(container) {
            container.innerHTML = `
                <div class="pill-nav fade-in">
                    <div class="pill active">All Games</div>
                    <div class="pill">Trending</div>
                    <div class="pill">Action</div>
                </div>
                <div class="chess-feature fade-in">
                    <div class="chess-glow"></div>
                    <img src="C:/Users/uSer/Downloads/chess.png" alt="Featured" class="chess-float-img">
                    <div class="hero-content">
                        <h2>Play & Win Big!</h2>
                        <p>₹1000 Prize Pool</p>
                        <button class="red-btn" onclick="navigateTo('myTournamentsPage', event)">Join Now</button>
                    </div>
                    <div class="chess-badge">🔥 Featured</div>
                </div>
                <div class="section-title fade-in"><span>Popular Games</span></div>
                <div class="slider-wrapper fade-in">
                    <div class="slider-container" id="games-slider"></div>
                </div>
                <div class="section-title fade-in"><span>All Games</span></div>
                <div class="games-grid fade-in" id="games-grid"></div>
                <div class="section-title fade-in"><span>Live Tournaments</span></div>
                <div id="tournament-list"></div>
            `;

            db.ref('games').on('value', snapshot => {
                const games = snapshot.val();
                if (!games) return;
                const sorted = Object.entries(games).sort((a,b) => new Date(b[1].created_at || 0) - new Date(a[1].created_at || 0));
                const cards = sorted.map(([id, game]) => `
                    <div class="game-card" onclick="window.location.href='${game.game_url}'">
                        <img src="${game.image_url}" alt="${game.title}">
                        <h4>${game.title}</h4>
                        <button class="gold-btn">PLAY</button>
                    </div>`).join('');
                document.getElementById('games-slider').innerHTML = cards;
                document.getElementById('games-grid').innerHTML = cards;
            });

            const tList = document.getElementById('tournament-list');
            const tSnap = await db.ref('tournaments').orderByChild('status').equalTo('Upcoming').once('value');
            const tours = tSnap.val();
            if (tours) {
                tList.innerHTML = Object.entries(tours).map(([id, t]) => `
                    <div class="tournament-list-card fade-in">
                        <div class="t-header"><span style="color:white">${t.title}</span></div>
                        <div class="t-image-wrapper"><img src="${t.image_url}"></div>
                        <div class="t-footer">
                            <span>Entry: ${formatCurrency(t.entry_fee)}</span>
                            <button class="gold-btn" onclick="joinTournament('${id}', ${t.entry_fee})">Join</button>
                        </div>
                    </div>`).join('');
            }
        }

        // Render My Tournaments Page
        async function renderMyTournamentsPage(container) {
            container.innerHTML = `<div class="pill-nav fade-in"><div class="pill active">Joined Matches</div></div><div id="my-list"></div>`;
            const allT = (await db.ref('tournaments').once('value')).val() || {};
            let html = '';
            for (const id in allT) {
                const p = (await db.ref(`participants/${id}/${auth.currentUser.uid}`).once('value')).val();
                if (p) {
                    const t = allT[id];
                    html += `
                        <div class="tournament-list-card fade-in">
                            <div class="t-header"><span style="color:white">${t.title}</span><span class="pill active" style="font-size:0.6rem">${t.status}</span></div>
                            <div class="t-image-wrapper"><img src="${t.image_url}"></div>
                            ${t.status === 'Live' ? `<button class="gold-btn" style="width:100%" onclick="window.location.href='${t.game_url}'">PLAY NOW</button>` : ''}
                        </div>`;
                }
            }
            document.getElementById('my-list').innerHTML = html || '<p class="text-center py-10">No matches joined.</p>';
        }

        // Render Wallet Page
        function renderWalletPage(container) {
            container.innerHTML = `
                <div class="wallet-card fade-in">
                    <p style="text-align:center">Balance</p>
                    <p class="wallet-balance">${formatCurrency(currentUserData.wallet_balance || 0)}</p>
                    <div class="wallet-actions">
                        <button onclick="toggleModal('addMoneyModal', true)" class="wallet-action-btn">Add Cash</button>
                        <button onclick="toggleModal('withdrawMoneyModal', true)" class="wallet-action-btn">Withdraw</button>
                    </div>
                </div>
                <div class="section-title"><span>Transactions</span></div>
                <div id="tx-list"></div>
            `;
            db.ref(`transactions/${auth.currentUser.uid}`).on('value', snap => {
                const txs = snap.val();
                if (!txs) return;
                document.getElementById('tx-list').innerHTML = Object.values(txs).reverse().map(t => `
                    <div class="transaction-item ${t.type}">
                        <div class="transaction-details"><h4>${t.description}</h4><p>${new Date(t.created_at).toLocaleString()}</p></div>
                        <p class="transaction-amount ${t.type}">${t.type === 'credit' ? '+' : '-'}${formatCurrency(t.amount)}</p>
                    </div>`).join('');
            });
        }

        // Render Profile Page
        function renderProfilePage(container) {
            container.innerHTML = `
                <div class="profile-card fade-in">
                    <div class="profile-avatar">${currentUserData.username[0].toUpperCase()}</div>
                    <h3 class="profile-name">${currentUserData.username}</h3>
                    <p class="profile-email">${currentUserData.email}</p>
                </div>
                <button class="profile-btn danger" onclick="auth.signOut()">Logout</button>
            `;
        }

        // NEW Render Rank Page
        async function renderRankPage(container) {
            container.innerHTML = `
                <div class="pill-nav fade-in"><div class="pill active">Global Leaderboard</div></div>
                <div id="rank-content" class="fade-in">
                    <div class="podium-container" id="podium-area"></div>
                    <div class="rank-list" id="rank-list-area"></div>
                </div>
            `;
            
            const usersSnap = await db.ref('users').orderByChild('wallet_balance').limitToLast(50).once('value');
            const users = usersSnap.val();
            if (!users) return;
            const sorted = Object.values(users).sort((a,b) => (b.wallet_balance || 0) - (a.wallet_balance || 0));

            // Podium (Top 3)
            const top3 = sorted.slice(0, 3);
            const podiumHtml = `
                <div class="podium-item second">
                    <div class="podium-badge">🥈</div>
                    <div class="podium-avatar">${top3[1]?.username[0] || '?'}</div>
                    <div class="podium-name">${top3[1]?.username || '---'}</div>
                    <div class="podium-score">${formatCurrency(top3[1]?.wallet_balance || 0)}</div>
                </div>
                <div class="podium-item first">
                    <div class="podium-badge">🥇</div>
                    <div class="podium-avatar">${top3[0]?.username[0] || '?'}</div>
                    <div class="podium-name">${top3[0]?.username || '---'}</div>
                    <div class="podium-score">${formatCurrency(top3[0]?.wallet_balance || 0)}</div>
                </div>
                <div class="podium-item third">
                    <div class="podium-badge">🥉</div>
                    <div class="podium-avatar">${top3[2]?.username[0] || '?'}</div>
                    <div class="podium-name">${top3[2]?.username || '---'}</div>
                    <div class="podium-score">${formatCurrency(top3[2]?.wallet_balance || 0)}</div>
                </div>
            `;
            document.getElementById('podium-area').innerHTML = podiumHtml;

            // List (Rest)
            const rest = sorted.slice(3);
            document.getElementById('rank-list-area').innerHTML = rest.map((user, i) => `
                <div class="leaderboard-item">
                    <div class="rank-num">${i + 4}</div>
                    <div class="lb-avatar">${user.username[0]}</div>
                    <div class="lb-info"><div class="lb-name">${user.username}</div></div>
                    <div class="lb-score">${formatCurrency(user.wallet_balance || 0)}</div>
                </div>
            `).join('');
        }

        async function joinTournament(id, fee) {
            if (currentUserData.wallet_balance < fee) return showToast('Insufficient balance', true);
            const updates = {
                [`users/${auth.currentUser.uid}/wallet_balance`]: currentUserData.wallet_balance - fee,
                [`participants/${id}/${auth.currentUser.uid}`]: { joined_at: new Date().toISOString() },
                [`transactions/${auth.currentUser.uid}/${db.ref().push().key}`]: { amount: fee, type: 'debit', description: 'Join Match', created_at: new Date().toISOString() }
            };
            await db.ref().update(updates);
            showToast('Joined successfully');
        }

        document.getElementById('addMoneyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amt = Number(e.target[0].value);
            const updates = {
                [`users/${auth.currentUser.uid}/wallet_balance`]: (currentUserData.wallet_balance || 0) + amt,
                [`transactions/${auth.currentUser.uid}/${db.ref().push().key}`]: { amount: amt, type: 'credit', description: 'Deposit', created_at: new Date().toISOString() }
            };
            await db.ref().update(updates);
            toggleModal('addMoneyModal', false);
            showToast('Added successfully');
        });

        document.getElementById('withdrawMoneyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amt = Number(e.target[0].value);
            if (amt > currentUserData.wallet_balance) return showToast('Insufficient funds', true);
            const updates = {
                [`users/${auth.currentUser.uid}/wallet_balance`]: currentUserData.wallet_balance - amt,
                [`transactions/${auth.currentUser.uid}/${db.ref().push().key}`]: { amount: amt, type: 'debit', description: 'Withdrawal', created_at: new Date().toISOString() }
            };
            await db.ref().update(updates);
            toggleModal('withdrawMoneyModal', false);
            showToast('Withdrawal processed');
        });
    </script>
</body>
</html>
